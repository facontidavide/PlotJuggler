name: ubuntu

on:
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ubuntu-build:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu-distro: ubuntu-20.04
            arch: x86_64

    steps:
      - name: Sync repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        shell: bash
        run: |
          set -euxo pipefail
          SUDO=""
          if command -v sudo >/dev/null 2>&1; then
            SUDO="sudo"
          fi
          export DEBIAN_FRONTEND=noninteractive
          export TZ=Etc/UTC
          ${SUDO} apt-get update
          ${SUDO} apt-get install -y -V --no-install-recommends \
            build-essential cmake pkg-config git ccache software-properties-common \
            qtbase5-dev libqt5svg5-dev libqt5websockets5-dev libqt5opengl5-dev \
            libqt5x11extras5-dev libprotoc-dev libmosquitto-dev ca-certificates \
            lsb-release wget libcurl4-openssl-dev

      - name: Install Apache Arrow for Parquet support
        shell: bash
        run: |
          set -uo pipefail
          SUDO=""
          if command -v sudo >/dev/null 2>&1; then
            SUDO="sudo"
          fi
          export DEBIAN_FRONTEND=noninteractive
          APT_ARGS="-y -V -o Dpkg::Use-Pty=0 -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30"
          if ${SUDO} apt-get ${APT_ARGS} update && ${SUDO} apt-get ${APT_ARGS} install libarrow-dev libparquet-dev; then
            echo "Installed Arrow packages from Ubuntu repositories."
          else
            echo "::warning::Arrow/Parquet packages are unavailable in this environment; continuing without DataLoadParquet plugin."
          fi

      - name: Prepare ccache
        shell: bash
        run: |
          mkdir -p ${{ runner.temp }}/ccache/tmp

      - name: Save ccache folder
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/ccache
          key: ${{ runner.os }}-${{ matrix.ubuntu-distro }}

      - name: Build Plotjuggler
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          CCACHE_DIR: ${{ runner.temp }}/ccache
        run: |
            set -euxo pipefail
            SUDO=""
            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            fi
            if ! command -v cmake >/dev/null 2>&1 || ! command -v git >/dev/null 2>&1; then
              export DEBIAN_FRONTEND=noninteractive
              export TZ=Etc/UTC
              ${SUDO} apt-get update
              ${SUDO} apt-get install -y -V --no-install-recommends build-essential cmake pkg-config git
            fi
            mkdir -p build
            if ! cmake . -B build -DCMAKE_BUILD_TYPE=Release -DPJ_INSTALLATION="appimage" \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DPJ_ENABLE_PARSER_PROTOBUF=OFF \
              -DPJ_PLUGINS_DIRECTORY="bin" 2>&1 | tee build/configure.log; then
              tail="$(tail -n 120 build/configure.log)"
              tail="${tail//'%'/'%25'}"
              tail="${tail//$'\r'/'%0D'}"
              tail="${tail//$'\n'/'%0A'}"
              echo "::error title=CMake configure failed::${tail}"
              exit 1
            fi
            if ! cmake --build build 2>&1 | tee build/build.log; then
              tail="$(grep -Ei '(^|[^a-z])(error|fatal|undefined reference|collect2:|ld:|no such file|FAILED:|CMake Error)' build/build.log | tail -n 80 || true)"
              if [ -z "${tail}" ]; then
                tail="$(tail -n 80 build/build.log)"
              fi
              tail="${tail//'%'/'%25'}"
              tail="${tail//$'\r'/'%0D'}"
              tail="${tail//$'\n'/'%0A'}"
              echo "::error title=Build Plotjuggler failed::${tail}"
              exit 1
            fi

      - name: Build AppImage
        working-directory: ${{ github.workspace }}
        if: startsWith(github.ref, 'refs/tags/')
        run: |
            wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.arch }}.AppImage
            wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${{ matrix.arch }}.AppImage
            chmod +x linuxdeploy*.AppImage
            mkdir -p AppDir/usr/bin
            cp -v build/bin/* AppDir/usr/bin
            export APPIMAGE_EXTRACT_AND_RUN=1
            ./linuxdeploy-${{ matrix.arch }}.AppImage --appdir=AppDir \
              -d ./io.plotjuggler.PlotJuggler.desktop \
              -i ./plotjuggler.png \
              --plugin qt --output appimage
            mv PlotJuggler-${{ matrix.arch }}.AppImage PlotJuggler-${{ github.ref_name }}-${{ matrix.arch }}.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: PlotJuggler-${{ github.ref_name }}-${{ matrix.arch }}.AppImage
          path: PlotJuggler-${{ github.ref_name }}-${{ matrix.arch }}.AppImage

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PlotJuggler-${{ github.ref_name }}-${{ matrix.arch }}.AppImage
          generate_release_notes: true
          fail_on_unmatched_files: false
