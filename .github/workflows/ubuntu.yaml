name: ubuntu

on:
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ubuntu-build:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu-distro: ubuntu-20.04
            arch: x86_64

    steps:
      - name: Sync repository
        uses: actions/checkout@v6

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: software-properties-common qtbase5-dev libqt5svg5-dev libqt5websockets5-dev libqt5opengl5-dev libqt5x11extras5-dev libprotoc-dev ccache libmosquitto-dev ca-certificates lsb-release wget libcurl4-openssl-dev
          version: 2.1

      - name: Install Apache Arrow for Parquet support
        shell: bash
        run: |
          set -euxo pipefail
          SUDO=""
          if command -v sudo >/dev/null 2>&1; then
            SUDO="sudo"
          fi
          export DEBIAN_FRONTEND=noninteractive
          APT_ARGS="-y -V -o Dpkg::Use-Pty=0 -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30"
          ${SUDO} apt-get ${APT_ARGS} update
          if ${SUDO} apt-get ${APT_ARGS} install libarrow-dev libparquet-dev; then
            echo "Installed Arrow packages from Ubuntu repositories."
            exit 0
          fi
          echo "::warning::Ubuntu repositories do not provide Arrow packages; falling back to Apache Arrow apt source."
          . /etc/os-release
          DISTRO_ID="${ID:-ubuntu}"
          CODENAME="${VERSION_CODENAME:-${UBUNTU_CODENAME:-}}"
          if [ -z "${CODENAME}" ]; then
            echo "::error::Unable to determine Ubuntu codename from /etc/os-release"
            exit 1
          fi
          if ! command -v wget >/dev/null 2>&1; then
            ${SUDO} apt-get ${APT_ARGS} install wget ca-certificates
          fi
          wget --timeout=30 --tries=3 --waitretry=5 "https://packages.apache.org/artifactory/arrow/${DISTRO_ID}/apache-arrow-apt-source-latest-${CODENAME}.deb"
          ${SUDO} apt-get ${APT_ARGS} install "./apache-arrow-apt-source-latest-${CODENAME}.deb"
          ${SUDO} apt-get ${APT_ARGS} update
          ${SUDO} apt-get ${APT_ARGS} install libarrow-dev libparquet-dev

      - name: Prepare ccache
        shell: bash
        run: |
          mkdir -p ${{ runner.temp }}/ccache/tmp

      - name: Save ccache folder
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/ccache
          key: ${{ runner.os }}-${{ matrix.ubuntu-distro }}

      - name: Build Plotjuggler
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          CCACHE_DIR: ${{ runner.temp }}/ccache
        run: |
            cmake . -B build -DCMAKE_BUILD_TYPE=Release -DPJ_INSTALLATION="appimage" \
                  -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                  -DPJ_PLUGINS_DIRECTORY="bin"
            cmake --build build

      - name: Build AppImage
        working-directory: ${{ github.workspace }}
        if: startsWith(github.ref, 'refs/tags/')
        run: |
            wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.arch }}.AppImage
            wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${{ matrix.arch }}.AppImage
            chmod +x linuxdeploy*.AppImage
            mkdir -p AppDir/usr/bin
            cp -v build/bin/* AppDir/usr/bin
            ./linuxdeploy-${{ matrix.arch }}.AppImage --appdir=AppDir \
              -d ./io.plotjuggler.PlotJuggler.desktop \
              -i ./plotjuggler.png \
              --plugin qt --output appimage
            mv PlotJuggler-${{ matrix.arch }}.AppImage PlotJuggler-${{ github.ref_name }}-${{ matrix.arch }}.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: PlotJuggler-${{ github.ref_name }}-${{ matrix.arch }}.AppImage
          path: PlotJuggler-${{ github.ref_name }}-${{ matrix.arch }}.AppImage

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PlotJuggler-${{ github.ref_name }}-${{ matrix.arch }}.AppImage
          generate_release_notes: true
          fail_on_unmatched_files: false
